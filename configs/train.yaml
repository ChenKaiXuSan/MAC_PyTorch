# hydra config
hydra:
  run:
    dir: ${log_path} # the log path, used for log and checkpoint
  sweep:
    dir: logs/
    subdir: ${experiment}/${now:%Y-%m-%d}/${now:%H-%M-%S}

loss:
  lr: 0.001
  weight_decay: 0.01

cross_validation:
  # 生成 index mapping 的配置（用于 cross_validation/generate_cv_index.py）
  num_persons: 2
  num_actions: 12
  num_cameras: 108
  strategies: [by_action]
  n_splits: 5
  force_recreate: false
  use_layer_camera_filter: true
  selected_layers: [0, 1, 2, 3, 4]
  selected_cameras_per_layer: # 隔90度选择一个摄像头，确保每层都有覆盖
    0: [0, 90, 180, 270]
    1: [0, 90, 180, 270]
    2: [0, 90, 180, 270]
    3: [0, 90, 180, 270]
    4: [0, 90, 180, 270]

data:
  raw:
    root_path: /workspace/data
    video_path: ${data.raw.root_path}/raw_data
    sam_3d_body_results_path: ${data.raw.root_path}/sam3d_body_results/person # 没有标签的训练数据
    sam3_results_path: ${data.raw.root_path}/sam3_results/person # 没有标签的训练数据

  unity:
    root_path: /workspace/data/skiing_unity_dataset
    data_path: ${data.unity.root_path}/data_pole_ski
    sam_3d_body_results_path: ${data.unity.root_path}/sam3d_body_results/inference # 有标签的训练数据
    sam3_results_path: ${data.unity.root_path}/sam3_results/inference # 只有2d标签的训练数据

  index_mapping: ${data.unity.root_path}/index_mapping # precomputed index mapping directory
  # index_mapping_file: camera_pairs_by_action.json # precomputed index mapping json file name
  index_mapping_path: ${data.index_mapping}/use_layer_camera_filter_enabled/camera_pairs_by_action_folds # precomputed index mapping json file path
  sam3d_export_path: ${data.unity.root_path}/sam3d_body_results/modalities_from_sam3d # exported kpt2d/kpt3d from SAM3D

  img_size: 224

  load_frames: true # whether to load video frames
  load_2d_kpt: false # whether to load 2d keypoints
  load_3d_kpt: true
  load_mask: false

  num_workers: 16
  batch_size: 32

model:
  backbone: pose2equip # dual2pose, pose2equip

  ablation_study: single # choices=[single, multi], help='the ablation study of the model, single means only one layer is used for fusion, multi means multiple layers are used for fusion'

train:
  # Training config
  max_epochs: 100 # numer of epochs of training

  view: single

  gpu: 0 # choices=[0, 1], help='the gpu number whicht to train'
  fold: 0 # the fold number for cross validation

# Used only when model.backbone=pose2equip
pose2equip:
  num_joints: 15
  dino_model_name: facebook/dinov2-base
  dino_freeze: true
  dino_image_size: 224

  loss_w_sym: 0.03
  loss_w_len_abs: 0.2
  loss_w_dino_feat: 0.1

  # 这里应该是过滤之后的idx
  left_ankle_idx: 10
  right_ankle_idx: 11
  left_wrist_idx: 12
  right_wrist_idx: 13

  # GT点索引，应该和unity记录的GT点顺序一致，或者至少保证能正确选取对应的点进行训练
  ski_gt_idx: [1, 2, 4, 5] # ski_l_front, ski_l_back, ski_r_front, ski_r_back
  pole_gt_idx: [0, 1, 2, 3] # pole_l_handle, pole_l_tip, pole_r_handle, pole_r_tip

dual2pose:
  num_joints: 15
  weight_decay: 0.01

  # Pre-align right-view 3D pose to left-view coordinates before fusion.
  rigid_align_right_to_left: true
  rigid_align_ref_variant: character

  d_model: 256
  n_layers: 4
  use_conf: true
  predict_logvar: false

  # frame branch
  use_dino_features: false
  dino_model_name: facebook/dinov2-base
  dino_freeze: true
  dino_image_size: 224
  dino_feature_dim: 768

  lambda_view_recon: 0.05
  lambda_alpha_balance: 0.02
  lambda_alpha_entropy: 0.005
  lambda_p0_supervise: 0.2

  lambda_mpjpe: 1.0
  lambda_bone: 0.1
  lambda_vel: 0.05
  lambda_acc: 0.02
  lambda_agree: 0.1
  lambda_bone_stab: 0.05

experiment: ${model.backbone} # the experiment name, used for log path
log_path: logs/train_unity/${experiment}/${now:%Y-%m-%d}/fold_${train.fold}
